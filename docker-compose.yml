services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cashier
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cashier}
      POSTGRES_DB: cashier
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashier"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://cashier:${POSTGRES_PASSWORD:-cashier}@postgres:5432/cashier
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-30}
      PORT: 3000
      WEB_ORIGIN: ${APP_ORIGIN:-http://localhost:8080}
      WORKER_HEARTBEAT_TIMEOUT_SECONDS: ${WORKER_HEARTBEAT_TIMEOUT_SECONDS:-90}
      ONE_C_API_KEY: ${ONE_C_API_KEY:-change-me-1c}
      ONE_C_ORGANIZATION_CODE: ${ONE_C_ORGANIZATION_CODE:-DEMO}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/docs"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001"]
      interval: 15s
      timeout: 5s
      retries: 5

  proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
