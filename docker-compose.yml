services:
  postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_USER: cashier, POSTGRES_PASSWORD: cashier, POSTGRES_DB: cashier }
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: [CMD-SHELL, "pg_isready -U cashier"], interval: 5s, timeout: 3s, retries: 10 }
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    env_file: .env
    ports: ["3000:3000"]
    depends_on: { postgres: { condition: service_healthy } }
    healthcheck: { test: [CMD, wget, -qO-, "http://localhost:3000/api/docs"], interval: 15s, timeout: 5s, retries: 5 }
  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    ports: ["5173:80"]
    depends_on: { api: { condition: service_healthy } }
    healthcheck: { test: [CMD, wget, -qO-, "http://localhost/health"], interval: 15s, timeout: 5s, retries: 5 }
volumes: { postgres_data: {} }
